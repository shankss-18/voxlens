<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VoxLens</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --border-bright: #363636;
      --text: #f0f0f0;
      --muted: #888;
      --accent: #e8ff6b;
      --accent-dim: rgba(232,255,107,0.10);
      --accent-dim2: rgba(232,255,107,0.18);
      --danger: #ff4d4d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Unbounded', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #ffffff;
    }
    .logo span { color: var(--accent); }

    .indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 0.06em;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s, box-shadow 0.3s;
      flex-shrink: 0;
    }
    .dot.on  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot.rec { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .lang-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .lang-label {
      font-size: 9px;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .lang-pills { display: flex; gap: 5px; }

    .lang-pill {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border-bright);
      background: transparent;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }
    .lang-pill:hover { color: #fff; border-color: #555; }
    .lang-pill.active {
      background: var(--accent-dim);
      border-color: rgba(232,255,107,0.35);
      color: var(--accent);
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-history:empty::before {
      content: 'ask anything about this page';
      display: block;
      text-align: center;
      color: #666;
      font-size: 10px;
      letter-spacing: 0.06em;
      margin-top: 16px;
    }

    .msg { display: flex; flex-direction: column; gap: 3px; }

    .msg-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #888;
    }
    .msg.assistant .msg-label { color: rgba(232,255,107,0.6); }

    .msg-bubble {
      font-size: 11px;
      line-height: 1.65;
      padding: 8px 11px;
      border-radius: 6px;
      max-width: 90%;
    }

    .msg.user .msg-bubble {
      background: #222;
      border: 1px solid #333;
      color: #f0f0f0;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .msg.assistant .msg-bubble {
      background: rgba(232,255,107,0.08);
      border: 1px solid rgba(232,255,107,0.18);
      color: #e8e8e8;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .stage {
      padding: 10px 16px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border-bright);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input::placeholder { color: #666; }
    .chat-input:focus { border-color: rgba(232,255,107,0.4); }

    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid rgba(232,255,107,0.3);
      background: rgba(232,255,107,0.08);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .send-btn:hover {
      background: rgba(232,255,107,0.18);
      border-color: rgba(232,255,107,0.5);
    }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 14px; height: 14px; }

    .mic-row {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .mic-wrap {
      position: relative;
      width: 56px; height: 56px;
      flex-shrink: 0;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--border-bright);
      transition: border-color 0.3s;
    }
    .ring-outer {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid transparent;
      opacity: 0;
    }
    .mic-wrap.listening .ring { border-color: var(--danger); }
    .mic-wrap.listening .ring-outer { opacity:1; border-color:rgba(255,77,77,0.2); animation:expand 1.2s infinite; }
    .mic-wrap.speaking  .ring { border-color: var(--accent); }
    .mic-wrap.speaking  .ring-outer { opacity:1; border-color:rgba(232,255,107,0.2); animation:expand 1s infinite; }
    @keyframes expand {
      0%   { transform:scale(1);    opacity:0.5; }
      100% { transform:scale(1.35); opacity:0;   }
    }

    .mic-btn {
      position: relative;
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border-bright);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      z-index: 1;
    }
    .mic-btn:hover  { background:#181818; transform:scale(1.04); }
    .mic-btn:active { transform:scale(0.96); }
    .mic-btn.listening { background:rgba(255,77,77,0.12); border-color:var(--danger); }
    .mic-btn.speaking  { background:var(--accent-dim2);   border-color:var(--accent); }

    .mic-icon  { width:18px; height:18px; }
    .stop-icon { display:none; width:14px; height:14px; }
    .mic-btn.listening .mic-icon  { display:none; }
    .mic-btn.listening .stop-icon { display:block; }

    .mic-info { flex:1; }

    .status-text {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.04em;
      line-height: 1.5;
    }
    .status-text.active { color: #f0f0f0; }
    .status-text.accent { color: var(--accent); }

    .wave {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .wave.visible { opacity: 1; }
    .wave-bar { width:2px; border-radius:2px; background:var(--accent); height:3px; transition:height 0.08s; }

    .voice-controls {
      display: none;
      gap: 8px;
      justify-content: center;
      width: 100%;
    }

    .ctrl-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 4px 16px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }
    .ctrl-btn:hover { opacity: 0.8; }

    #pauseBtn {
      border: 1px solid var(--border-bright);
      background: var(--surface2);
      color: #e0e0e0;
    }
    #stopBtn {
      border: 1px solid rgba(255,77,77,0.45);
      background: rgba(255,77,77,0.1);
      color: #ff6b6b;
    }

    .bottombar {
      padding: 6px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .voice-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      color: #999;
      letter-spacing: 0.06em;
    }

    .voice-badge {
      background: var(--accent-dim);
      border: 1px solid rgba(232,255,107,0.25);
      color: var(--accent);
      font-size: 8px;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.1em;
    }
    

    .clear-btn, .export-btn {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #999;
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 8px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.2s, border-color 0.2s;
    }
    .clear-btn:hover, .export-btn:hover { color: #f0f0f0; border-color: var(--border-bright); }
    .export-btn { color: var(--accent); border-color: rgba(232,255,107,0.25); }
    .export-btn:hover { color: var(--accent); border-color: rgba(232,255,107,0.5); }
    .action-btns { display: flex; gap: 6px; }

    #langSelect { display: none; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">VOX<span>LENS</span></div>
    <div class="indicator">
      <div class="dot" id="dot"></div>
      <span id="indicatorText">idle</span>
    </div>
  </div>

  <div class="lang-bar">
    <span class="lang-label">lang</span>
    <div class="lang-pills">
      <button class="lang-pill active" data-lang="auto">auto</button>
      <button class="lang-pill" data-lang="en">EN</button>
      <button class="lang-pill" data-lang="hi">हि</button>
      <button class="lang-pill" data-lang="te">తె</button>
    </div>
  </div>

  <select id="langSelect">
    <option value="auto" selected>auto</option>
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="te">Telugu</option>
  </select>

  <div class="chat-history" id="chatHistory"></div>

  <div class="chat-input-bar">
    <input type="text" class="chat-input" id="chatInput" placeholder="type a message..." autocomplete="off" />
    <button class="send-btn" id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="stage">
    <div class="mic-row">
      <div class="mic-wrap" id="micWrap">
        <div class="ring-outer"></div>
        <div class="ring"></div>
        <button class="mic-btn" id="micBtn" title="Click to speak">
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="#f0f0f0"/>
            <path d="M5 11a7 7 0 0014 0" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 18v3" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9 21h6" stroke="#f0f0f0" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="stop-icon" viewBox="0 0 14 14" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="2" fill="#ff4d4d"/>
          </svg>
        </button>
      </div>

      <div class="mic-info">
        <div class="status-text" id="statusText">tap to speak</div>
        <div class="wave" id="wave">
          <div class="wave-bar" id="wb1"></div><div class="wave-bar" id="wb2"></div>
          <div class="wave-bar" id="wb3"></div><div class="wave-bar" id="wb4"></div>
          <div class="wave-bar" id="wb5"></div><div class="wave-bar" id="wb6"></div>
          <div class="wave-bar" id="wb7"></div><div class="wave-bar" id="wb8"></div>
          <div class="wave-bar" id="wb9"></div><div class="wave-bar" id="wb10"></div>
        </div>
      </div>
    </div>

    <div class="voice-controls" id="voiceControls">
      <button class="ctrl-btn" id="pauseBtn">⏸ pause</button>
      <button class="ctrl-btn" id="stopBtn">■ stop</button>
    </div>
  </div>
  

  <div class="bottombar">
    <div class="voice-tag">
      <span>falcon</span>
      <span class="voice-badge">MURF AI</span>
    </div>
    <div class="action-btns">
      <button class="export-btn" id="exportBtn">↓ export</button>
      <button class="clear-btn" id="clearBtn">clear chat</button>
    </div>
  </div>

  <script src="ui.js"></script>
  <script src="popup.js"></script>
  <script src="pills.js"></script>

</body>
</html>
